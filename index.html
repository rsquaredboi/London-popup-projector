<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wall of Came — Hello Nancy 🍋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ED1E9C; --pink2:#C0117A; --pink-lt:#F4D9E6; --plum:#2A0A1E;
    --cream:#FBEFD8; --lemon:#FCD94A; --lemon-dk:#E8B400; --leaf:#5FB85A;
    --disp:'Fraunces',Georgia,serif; --cond:'Anton',Impact,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--plum);font-family:var(--disp);cursor:none}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;transition:background .6s ease}
  .q{font-family:var(--disp);font-weight:900;line-height:.95;letter-spacing:-.015em;padding:0 7vw;max-width:90vw}
  .qb{display:flex;flex-direction:column;align-items:center;gap:2.4vh;max-width:92vw;padding:0 4vw}
  .by{font-family:var(--cond);font-size:2.7vh;letter-spacing:.05em;text-transform:uppercase;
    padding:.5vh 1.8vh;border-radius:999px;background:var(--plum);color:var(--cream);white-space:nowrap}
  .c4 .by,.c6 .by,.c8 .by,.c9 .by{background:var(--lemon);color:var(--plum)}
  .cby{display:block;font-family:var(--cond);font-size:.42em;letter-spacing:.05em;text-transform:uppercase;color:var(--lemon);margin-top:.4em}
  .nby{display:block;font-family:var(--cond);font-size:.62em;letter-spacing:.04em;text-transform:uppercase;margin-top:.7em;opacity:.65}

  /* ===== BRAND CHROME (persistent) ===== */
  #logo{position:fixed;left:26px;top:20px;z-index:60;background:var(--cream);padding:9px 15px 7px;border-radius:16px;box-shadow:0 6px 22px rgba(0,0,0,.25)}
  #logo img{height:30px;display:block}
  .mascot{position:fixed;right:22px;top:14px;width:108px;height:auto;z-index:60;animation:bob 3.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-10px) rotate(4deg)}}
  /* event ticker footer */
  #foot{position:fixed;left:0;right:0;bottom:0;height:7.2vh;min-height:52px;background:var(--pink);z-index:60;
    display:flex;align-items:center;overflow:hidden;border-top:3px solid var(--cream)}
  #foot .run{white-space:nowrap;font-family:var(--cond);color:var(--cream);font-size:3.4vh;letter-spacing:.06em;
    animation:run 30s linear infinite;text-transform:uppercase}
  #foot .run span{padding:0 1.6vw}
  @keyframes run{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  /* confetti motifs */
  .deco{position:fixed;z-index:2;pointer-events:none;opacity:.9}
  /* dev HUD */
  #name{position:fixed;left:50%;top:18px;transform:translateX(-50%);color:rgba(255,255,255,.8);font-family:var(--cond);
    font-size:14px;letter-spacing:.3em;text-transform:uppercase;z-index:61;mix-blend-mode:difference;transition:opacity .4s}
  #hud{position:fixed;left:0;right:0;bottom:8.4vh;text-align:center;color:rgba(0,0,0,.4);font-family:var(--cond);
    font-size:12px;letter-spacing:.2em;text-transform:uppercase;z-index:61;transition:opacity .4s}
  .idle #hud,.idle #name{opacity:0}

  /* ===== INTRO SPLASH ===== */
  #intro{position:fixed;inset:0;z-index:90;background:var(--lemon);display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;transition:opacity .8s ease;overflow:hidden}
  #intro.gone{opacity:0;pointer-events:none}
  #intro .wm{height:13vh;margin-bottom:1vh;z-index:2}
  #intro .big{font-family:var(--disp);font-weight:900;color:var(--pink);font-size:15vw;line-height:.86;z-index:2;
    text-shadow:5px 6px 0 var(--cream);animation:pin .6s cubic-bezier(.2,1.4,.3,1) both}
  #intro .sub{font-family:var(--cond);color:var(--pink2);font-size:3.4vh;letter-spacing:.12em;text-transform:uppercase;margin-top:2vh;z-index:2}
  #intro .masc{width:22vh;margin-top:1vh;z-index:2;animation:bob 3.2s ease-in-out infinite}
  @keyframes pin{0%{transform:scale(2.2) rotate(-6deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

  /* ===== CONCEPTS (brand palette) ===== */
  .c0{background:var(--pink)} .c0 .q{color:var(--cream);font-size:11vw;animation:slam .5s cubic-bezier(.2,1.4,.3,1) both}
  @keyframes slam{0%{transform:scale(2.3);opacity:0}100%{transform:scale(1);opacity:1}}

  .c1{background:var(--lemon);flex-direction:column;gap:2.4vh}
  .c1 .row{white-space:nowrap;font-family:var(--cond);font-size:11vh;letter-spacing:.01em;text-transform:uppercase}
  .c1 .row span{padding:0 3vw}
  .c1 .r0{color:var(--pink);animation:scrollL 28s linear infinite}
  .c1 .r1{color:var(--plum);animation:scrollR 34s linear infinite}
  .c1 .r2{color:var(--pink2);animation:scrollL 24s linear infinite}
  @keyframes scrollL{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  @keyframes scrollR{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}

  .c2{background:var(--cream)} .c2 .q{color:var(--pink2);font-size:10vw}
  .c2 .w{display:inline-block;transform-origin:50% 0;animation:flip .55s ease both}
  @keyframes flip{0%{transform:rotateX(-95deg);opacity:0}100%{transform:rotateX(0);opacity:1}}

  .c3{background:var(--pink)} .c3 .q{color:var(--cream);font-size:10vw;position:relative;z-index:3;text-shadow:0 6px 26px rgba(0,0,0,.22)}
  .drop{position:absolute;top:-12vh;font-size:5.5vh;z-index:1;animation:fall linear infinite}
  @keyframes fall{to{transform:translateY(125vh) rotate(220deg)}}

  .c4{background:var(--pink2)} .c4 .q{font-size:10vw;color:rgba(251,239,216,.22)}
  .c4 .w{transition:color .25s,text-shadow .25s}
  .c4 .w.on{color:var(--lemon);text-shadow:0 0 30px rgba(252,217,74,.55)}

  .c5{background:var(--pink-lt)}
  .c5 .note{position:absolute;width:23vw;min-height:23vw;padding:2vw;display:flex;align-items:center;justify-content:center;
    text-align:center;font-family:var(--disp);font-size:2.5vw;font-weight:600;color:var(--plum);
    box-shadow:0 12px 28px rgba(0,0,0,.18);animation:pop .4s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes pop{0%{transform:scale(0) rotate(var(--r))}100%{transform:scale(1) rotate(var(--r))}}

  .c6{background:#170309} .c6 .q{font-size:10vw;color:#ffe1f1;
    text-shadow:0 0 8px #ff4fbf,0 0 22px #ED1E9C,0 0 60px #ED1E9C,0 0 110px #C0117A;animation:flick 3s infinite}
  @keyframes flick{0%,18%,22%,25%,53%,57%,100%{opacity:1}20%,24%,55%{opacity:.4}}

  .c7{background:var(--lemon)} .c7 .q{font-size:9.5vw;line-height:1.04}
  .c7 .w{display:inline-block;margin:0 .12em;padding:.02em .2em;border-radius:9px}

  .c8{background:var(--pink2);align-items:flex-start}
  .c8 .scroll{position:absolute;width:100%;text-align:center;animation:up 32s linear infinite}
  .c8 .scroll p{font-family:var(--disp);font-weight:900;font-size:6.6vh;color:var(--cream);padding:3vh 8vw;line-height:1.02}
  .c8 .scroll p:nth-child(3n){color:var(--lemon)}
  @keyframes up{0%{transform:translateY(100vh)}100%{transform:translateY(-100%)}}

  .c9{background:#0a0006} .c9 .q{font-size:11vw;color:var(--cream);position:relative;animation:gjit .18s steps(2) infinite}
  .c9 .q::before,.c9 .q::after{content:attr(data-t);position:absolute;left:0;top:0;width:100%;opacity:.85}
  .c9 .q::before{color:#ff2d9b;animation:gsh1 1.6s infinite linear alternate}
  .c9 .q::after{color:#22e0ff;animation:gsh2 1.9s infinite linear alternate}
  @keyframes gjit{0%{transform:translate(0)}50%{transform:translate(.4px,-.4px)}100%{transform:translate(-.3px,.3px)}}
  @keyframes gsh1{0%{clip-path:inset(0 0 82% 0);transform:translateX(-6px)}50%{clip-path:inset(46% 0 30% 0);transform:translateX(5px)}100%{clip-path:inset(78% 0 4% 0);transform:translateX(-4px)}}
  @keyframes gsh2{0%{clip-path:inset(70% 0 8% 0);transform:translateX(6px)}50%{clip-path:inset(20% 0 56% 0);transform:translateX(-5px)}100%{clip-path:inset(4% 0 80% 0);transform:translateX(4px)}}
</style>
</head>
<body>
<div id="logo"><img src="nancy-logo.png" alt="Hello Nancy"></div>
<svg class="mascot" viewBox="0 0 140 152"></svg>
<div id="name"></div>
<div id="stage"></div>
<div id="hud">1–0 concepts · ←/→ quote · space pause · F fullscreen</div>
<div id="foot"><div class="run"></div></div>

<div id="intro">
  <img class="wm" src="nancy-logo.png" alt="Nancy">
  <div class="big">WALL OF<br>CAME</div>
  <svg class="masc" viewBox="0 0 140 152"></svg>
  <div class="sub">Covent Garden · June 27 · first come, first served</div>
</div>

<script>
const MASCOT=`
<path d="M92 30 q24-15 36-4 q-11 17-36 12z" fill="#5FB85A"/>
<g fill="#ED1E9C"><path d="M70 17 L51 4 L53 31 Z"/><path d="M70 17 L89 4 L87 31 Z"/><circle cx="70" cy="18" r="7.5"/></g>
<ellipse cx="70" cy="94" rx="49" ry="43" fill="#FCD94A" stroke="#E8B400" stroke-width="3.5"/>
<ellipse cx="53" cy="77" rx="13" ry="8" fill="#FFF3B0" opacity=".75"/>
<ellipse cx="70" cy="136" rx="6" ry="4" fill="#E8B400"/>
<circle cx="55" cy="92" r="6.5" fill="#2A0A1E"/><circle cx="85" cy="92" r="6.5" fill="#2A0A1E"/>
<circle cx="57.5" cy="89.5" r="2.2" fill="#fff"/><circle cx="87.5" cy="89.5" r="2.2" fill="#fff"/>
<path d="M57 107 q13 13 26 0" fill="none" stroke="#2A0A1E" stroke-width="4" stroke-linecap="round"/>
<circle cx="43" cy="104" r="6.5" fill="#FF8FC4" opacity=".85"/><circle cx="97" cy="104" r="6.5" fill="#FF8FC4" opacity=".85"/>`;
document.querySelectorAll('.mascot,.masc').forEach(s=>s.innerHTML=MASCOT);

const QUOTES=[
 {q:"The fourth setting briefly opened a wormhole to another dimension.",by:"James D."},
 {q:"I wasn't even in the mood. Now I have to hide it from myself just to get anything done.",by:"Moa M."},
 {q:"I went back for seconds like it was a Thanksgiving plate!",by:"Chanute L."},
 {q:"An atmospheric river occurred resulting in localized flooding.",by:"M W."},
 {q:"My husband got jealous and stomped on my Lem smashing it to pieces.",by:"Kristen H."},
 {q:"I may throw out everything else. Including the husband (just kidding).",by:"Julie C."},
 {q:"It sucks your soul right out of your feet.",by:"Sherry H."},
 {q:"I felt happy and a little inferior lol",by:"Nick G."},
 {q:"I cum so hard that I honestly think I might be having a heart attack!",by:"Rebecca"},
 {q:"I had to throw out my mattress.",by:"Ang L."},
 {q:"Wife is slaughtered on speed 2!!!",by:"Kyle B."},
 {q:"I am a fit almost 78 year old. And enjoying sharing my bed with a lemon.",by:"Milly H."},
 {q:"She may never need a man again!",by:"Paul G."},
 {q:"The Lem makes me go back for seconds 👀",by:"Pamela C."},
 {q:"It must have been developed by a woman lol",by:"Lesley W."},
 {q:"Every night since purchasing.",by:"Jessica T."},
 {q:"What kind of voodoo is this???",by:"Jeannine T."},
 {q:"Buying one for every woman I know for Christmas.",by:"Michelle N."},
 {q:"Too shy to say",by:"Coralie A."},
 {q:"44 years without this little lemon squeeze.",by:"Moon"},
 {q:"I threw out all my other devices as they were inferior.",by:"Paula H."},
 {q:"It broke my pum pum.",by:"James S."},
 {q:"Not joking, I got off 3 times the other night.",by:"Elizabeth B."},
 {q:"Now I'm interested in adding more fruit to my diet!",by:"Lisa F."},
 {q:"It will have you screaming loud enough to wake the dead.",by:"Rachael J."},
 {q:"I'm 32 and just had my first orgasm thanks to the lemon.",by:"Hailey N."},
 {q:"I couldn't even walk straight.",by:"Lim W.Y."},
 {q:"He is in some serious trouble.",by:"Helen C."},
 {q:"Actual tears while laughing.",by:"Ang K."},
 {q:"I would shout it from the rooftops if I could.",by:"Nicole D."},
 {q:"Returned my wife to pre-menopausal multi-orgasmic heaven!",by:"Robert G."},
 {q:"If I could give 10 stars, I would!",by:"Robin N."},
 {q:"I never write reviews. Ever.",by:"Tiffany"},
 {q:"She never disappoints!",by:"Sandra N."},
 {q:"If you're on the fence hop right off that fence.",by:"Diane D."},
 {q:"I feel like a new woman!",by:"Colleen C."},
 {q:"The reviews were NOT over hyped.",by:"Jessica B."},
 {q:"OOOOOOOH boy",by:"Diane W."},
 {q:"Join the incredibly satisfied brigade.",by:"Moira A."}
];

const NAMES=['Slam','Ticker','Split-flap','Lemon rain','Karaoke','Stickies','Neon','Ransom','Credits','Glitch'];
const RANSOM=['#ED1E9C','#FCD94A','#fff','#2A0A1E','#C0117A'];
const stage=document.getElementById('stage'),nameEl=document.getElementById('name');
const rand=a=>a[Math.floor(Math.random()*a.length)];
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
let qi=Math.floor(Math.random()*QUOTES.length),cur=0,cleanup=null,autoTimer=null,paused=false;

document.querySelector('#foot .run').innerHTML=(()=>{const TAGS=['FEMALE PLEASURE, OUT LOUD','WE SQUEEZE, WE DON’T WHISPER','PLEASURE IS NOT A DIRTY WORD','STOP WHISPERING','MADE BY WOMEN, FOR WOMEN','NO SHAME — JUST LEMONS','SELF-LOVE, FULLY CHARGED','DON’T TELL YOUR NAN','SAY IT LOUDER FOR THE VENUES AT THE BACK','THE LOUDEST POP-UP IN LONDON'];const t=' ★ '+TAGS.join(' ★ ')+' ';return `<span>${t}</span><span>${t}</span>`;})();

function fitLen(el,t){if(!el)return;const n=(t||'').length;el.style.fontSize=(n<13?10.5:n<21?8.5:n<31?6.8:n<43?5.4:4.6)+'vw';}
function fq(){return stage.querySelector('.q');}
function cycle(render,ms){render(QUOTES[qi]);const id=setInterval(()=>{qi=(qi+1)%QUOTES.length;render(QUOTES[qi]);},ms);return()=>clearInterval(id);}
function words(s){return s.split(' ');}
function block(inner,by){return `<div class="qb"><div class="q">“${inner}”</div><div class="by">— ${esc(by)}</div></div>`;}

const C=[
 ()=>cycle(it=>{stage.innerHTML=block(esc(it.q),it.by);fitLen(fq(),it.q);},3800),
 ()=>{const dup=QUOTES.concat(QUOTES);const row=c=>`<div class="row ${c}">${dup.map(it=>`<span>“${esc(it.q)}” — ${esc(it.by)}</span>`).join('🍋')}</div>`;stage.innerHTML=row('r0')+row('r1')+row('r2');return()=>{};},
 ()=>cycle(it=>{stage.innerHTML=block(words(it.q).map((w,i)=>`<span class="w" style="animation-delay:${i*.07}s">${esc(w)}&nbsp;</span>`).join(''),it.by);fitLen(fq(),it.q);},3000),
 ()=>{let drops='';for(let i=0;i<26;i++){drops+=`<div class="drop" style="left:${Math.random()*100}vw;animation-duration:${3+Math.random()*4}s;animation-delay:${-Math.random()*6}s">${Math.random()<.7?'🍋':(Math.random()<.5?'🫐':'🥑')}</div>`;}const c=cycle(it=>{const o=stage.querySelector('.qb');if(o)o.remove();stage.insertAdjacentHTML('beforeend',block(esc(it.q),it.by));fitLen(fq(),it.q);},3800);stage.insertAdjacentHTML('afterbegin',drops);return c;},
 ()=>{let t=[];const r=it=>{stage.innerHTML=block(words(it.q).map(w=>`<span class="w">${esc(w)}</span>`).join(' '),it.by);fitLen(fq(),it.q);stage.querySelectorAll('.q .w').forEach((w,i)=>{t.push(setTimeout(()=>w.classList.add('on'),250+i*240));});};r(QUOTES[qi]);const iv=setInterval(()=>{t.forEach(clearTimeout);t=[];qi=(qi+1)%QUOTES.length;r(QUOTES[qi]);},4000);return()=>{clearInterval(iv);t.forEach(clearTimeout);};},
 ()=>{let n=0;const tones=['#FCD94A','#FBEFD8','#FF8FC4','#fff'];const add=()=>{if(n>=18){stage.innerHTML='';n=0;}const it=QUOTES[(qi++)%QUOTES.length];const r=(Math.random()*16-8).toFixed(1);stage.insertAdjacentHTML('beforeend',`<div class="note" style="left:${Math.random()*70}vw;top:${Math.random()*60}vh;--r:${r}deg;background:${rand(tones)}">“${esc(it.q)}”<span class="nby">— ${esc(it.by)}</span></div>`);n++;};add();add();add();const id=setInterval(add,700);return()=>clearInterval(id);},
 ()=>cycle(it=>{stage.innerHTML=block(esc(it.q),it.by);fitLen(fq(),it.q);},3800),
 ()=>cycle(it=>{stage.innerHTML=block(words(it.q).map(w=>{const fs=(.78+Math.random()*.8).toFixed(2);const rot=(Math.random()*14-7).toFixed(1);const bg=rand(RANSOM);const fg=(bg==='#FCD94A'||bg==='#fff')?'#2A0A1E':'#fff';return `<span class="w" style="font-size:${fs}em;transform:rotate(${rot}deg);background:${bg};color:${fg}">${esc(w)}</span>`;}).join(''),it.by);fitLen(fq(),it.q);},2900),
 ()=>{stage.innerHTML=`<div class="scroll">${QUOTES.map(it=>`<p>“${esc(it.q)}”<span class="cby">— ${esc(it.by)}</span></p>`).join('')}</div>`;return()=>{};},
 ()=>cycle(it=>{stage.innerHTML=`<div class="qb"><div class="q" data-t="“${esc(it.q)}”">“${esc(it.q)}”</div><div class="by">— ${esc(it.by)}</div></div>`;fitLen(fq(),it.q);},2900),
];

function show(i){if(cleanup)cleanup();cur=(i+C.length)%C.length;stage.className='';void stage.offsetWidth;stage.className='c'+cur;stage.innerHTML='';nameEl.textContent=(cur+1<10?'0':'')+(cur+1)+' · '+NAMES[cur];cleanup=C[cur]();}
function nextC(){show(cur+1);}
function startAuto(){clearInterval(autoTimer);autoTimer=setInterval(()=>{if(!paused)nextC();},14000);}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9'){show(e.key==='0'?9:(+e.key-1));startAuto();}
  else if(e.key==='ArrowRight'){qi=(qi+1)%QUOTES.length;show(cur);startAuto();}
  else if(e.key==='ArrowLeft'){qi=(qi-2+QUOTES.length)%QUOTES.length;show(cur);startAuto();}
  else if(e.key===' '){paused=!paused;e.preventDefault();}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
});
let idle;function wake(){document.body.classList.remove('idle');clearTimeout(idle);idle=setTimeout(()=>document.body.classList.add('idle'),2500);}
document.addEventListener('mousemove',wake);document.addEventListener('keydown',wake);wake();

show(0);startAuto();
setTimeout(()=>document.getElementById('intro').classList.add('gone'),3800);
</script>
</body>
</html>
